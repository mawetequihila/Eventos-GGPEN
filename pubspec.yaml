name: ggpen_angotic
description: Agenda da GGPEN no Angotic 2026 (Angola ICT Forum).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  shared_preferences: ^2.5.5
  qr_flutter: ^4.1.0
  lucide_icons_flutter: ^3.1.14+2
  google_fonts: ^8.1.0
  supabase_flutter: ^2.12.4
  url_launcher: ^6.3.2
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  webview_flutter: ^4.13.1
dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/logo_ggpen.png
    - assets/logo_angotic.png
    - assets/banners/
    - assets/venue/venue_map.html
    - assets/venue/three.min.js
    - assets/promo1.png
    - assets/promo2.png

# Ícone da app (Android + web) gerado a partir da logo GGPEN.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/logo_ggpen.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo_ggpen.png"
  web:
    generate: true
    image_path: "assets/logo_ggpen.png"
    background_color: "#FFFFFF"
    theme_color: "#0E1B3D"
